syntax = "proto3";

package kv;

option go_package = "github.com/Priyanshu-1729/mini-etcd/proto";

service KVService {
  rpc Get(GetRequest)       returns (GetResponse);
  rpc Put(PutRequest)       returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Watch(WatchRequest)   returns (stream WatchEvent);
}

message GetRequest  { string key = 1; }
message GetResponse { string key = 1; string value = 2; bool found = 3; }

message PutRequest  { string key = 1; string value = 2; }
message PutResponse { bool success = 1; }

message DeleteRequest  { string key = 1; }
message DeleteResponse { bool success = 1; }

message WatchRequest { string key = 1; }
message WatchEvent   { string type = 1; string key = 2; string value = 3; }
